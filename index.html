<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>GemKeeper</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

    <style type="text/css">
        * { padding: 0; margin: 0; }
        html, body { background: #000; color: #fff; overflow: hidden; touch-action: none; -ms-touch-action: none; }
        canvas { touch-action-delay: none; touch-action: none; -ms-touch-action: none; }
        
        /* 顶部导航条：手动触发 + 法律链接 */
        #tt-nav-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 44px;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 10000;
            font-family: Arial, sans-serif;
            font-size: 13px;
        }
        #tt-nav-bar a { 
            color: #fff; 
            text-decoration: none; 
            padding: 5px 10px; 
            border-radius: 4px; 
            background: rgba(255, 255, 255, 0.1); 
        }
        /* 红色高亮快捷方式按钮，引导用户 */
        #btn-add-desktop { 
            color: #ff0050 !important; 
            font-weight: bold; 
            border: 1px solid #ff0050; 
        }
    </style>

    <script src="https://lf16-pangle.pangle.io/obj/pangle-sdk-static/tt_ads_sdk.js"></script>
    <script>
        const TT_CONFIG = {
            appId: '8088033', 
            rewardId: '1814660991950882'
        };

        // 初始化
        if (typeof tt !== 'undefined') {
            tt.config({ appId: TT_CONFIG.appId });
        }

        // 广告播放
        window.showTikTokAd = function() {
            console.log("尝试唤起广告...");
            if (typeof tt !== 'undefined' && tt.createRewardedVideoAd) {
                const videoAd = tt.createRewardedVideoAd({ adUnitId: TT_CONFIG.rewardId });
                videoAd.show().catch(err => { 
                    console.error("广告显示失败", err);
                    onAdFinished(); 
                });
                videoAd.onClose(res => { if (res && res.isEnded) onAdFinished(); });
            } else {
                onAdFinished();
            }
        };

        // 添加桌面快捷方式
        window.addGameShortcut = function() {
            if (typeof tt !== 'undefined' && tt.addShortcut) {
                tt.addShortcut({
                    success: () => console.log("快捷方式请求成功"),
                    fail: (err) => console.log("快捷方式请求失败", err)
                });
            } else {
                console.log("非 TikTok 环境或 SDK 未加载");
            }
        };

        function onAdFinished() { console.log("广告流程结束"); }
    </script>
</head> 
 
<body> 
    <div id="tt-nav-bar">
        <a id="btn-add-desktop" href="javascript:void(0);" onclick="window.addGameShortcut()">收藏游戏</a>
        <a href="https://chunkit0625.github.io/GemKeeper/privacy.html" target="_blank">隐私政策</a>
        <a href="https://chunkit0625.github.io/GemKeeper/terms.html" target="_blank">服务条款</a>
    </div>

    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="720" height="1280"></canvas>
    </div>
    
    <script src="jquery-2.0.0.min.js"></script>
    <script src="c2runtime.js"></script>

    <script>
        jQuery(window).resize(function() {
            cr_sizeCanvas(jQuery(window).width(), jQuery(window).height());
        });
        
        jQuery(document).ready(function () {            
            if (typeof cr_createRuntime !== "undefined") {
                cr_createRuntime("c2canvas");

                // 主页自动提示：进游戏 3 秒后自动尝试弹出添加桌面
                setTimeout(function() {
                    window.addGameShortcut();
                }, 3000);
            }
        });
        
        function onVisibilityChanged() {
            if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        };
        document.addEventListener("visibilitychange", onVisibilityChanged, false);
    </script>
</body> 
</html>
